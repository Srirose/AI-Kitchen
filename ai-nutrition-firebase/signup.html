<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Sign Up - AI-Powered Sustainable Nutrition Analyzer</title>
  <link rel="stylesheet" href="css/styles.css">
</head>
<body class="auth-page">
  <div class="auth-container">
    <div class="auth-header">
      <div class="logo">
        <svg xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24" stroke="currentColor">
          <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 6.253v13m0-13C10.832 5.477 9.246 5 7.5 5S4.168 5.477 3 6.253v13C4.168 18.477 5.754 18 7.5 18s3.332.477 4.5 1.253m0-13C13.168 5.477 14.754 5 16.5 5c1.747 0 3.332.477 4.5 1.253v13C19.832 18.477 18.247 18 16.5 18c-1.746 0-3.332.477-4.5 1.253" />
        </svg>
      </div>
      <h1>Create Account</h1>
      <p>Start your sustainable nutrition journey</p>
    </div>

    <div id="error-message" class="error-message hidden"></div>

    <form id="signup-form">
      <div class="form-group">
        <label for="name" class="form-label">Full Name</label>
        <input 
          type="text" 
          id="name" 
          name="name" 
          class="form-input" 
          placeholder="Enter your full name"
          required
        >
      </div>

      <div class="form-group">
        <label for="email" class="form-label">Email Address</label>
        <input 
          type="email" 
          id="email" 
          name="email" 
          class="form-input" 
          placeholder="Enter your email"
          required
        >
      </div>

      <div class="form-group">
        <label for="password" class="form-label">Password</label>
        <div class="input-wrapper">
          <input 
            type="password" 
            id="password" 
            name="password" 
            class="form-input" 
            placeholder="Create a password (min 6 characters)"
            minlength="6"
            required
          >
          <button type="button" class="password-toggle" aria-label="Toggle password visibility">👁️</button>
        </div>
      </div>

      <div class="form-group">
        <label for="confirmPassword" class="form-label">Confirm Password</label>
        <div class="input-wrapper">
          <input 
            type="password" 
            id="confirmPassword" 
            name="confirmPassword" 
            class="form-input" 
            placeholder="Confirm your password"
            required
          >
          <button type="button" class="password-toggle" aria-label="Toggle password visibility">👁️</button>
        </div>
      </div>

      <button type="submit" id="submit-btn" class="btn btn-primary">
        Create Account
      </button>
    </form>

    <div class="auth-footer">
      <p>Already have an account? <a href="login.html">Sign in</a></p>
    </div>
  </div>

  <script type="module">
    import { initAuth, handleSignup, initPasswordToggle } from './js/auth.js';
    
    // Initialize authentication state
    initAuth();
    
    // Initialize password toggles
    initPasswordToggle();
    
    // Handle form submission
    document.getElementById('signup-form').addEventListener('submit', handleSignup);
  </script>
</body>
</html>
