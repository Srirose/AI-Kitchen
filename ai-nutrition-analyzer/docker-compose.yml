version: '3.8'

services:
  mongodb:
    image: mongo:7.0
    container_name: ai-nutrition-mongodb
    restart: unless-stopped
    ports:
      - "27017:27017"
    environment:
      MONGO_INITDB_ROOT_USERNAME: admin
      MONGO_INITDB_ROOT_PASSWORD: password123
      MONGO_INITDB_DATABASE: ai-nutrition-analyzer
    volumes:
      - mongodb_data:/data/db
    networks:
      - ai-nutrition-network

  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    container_name: ai-nutrition-backend
    restart: unless-stopped
    ports:
      - "5000:5000"
    environment:
      - NODE_ENV=production
      - PORT=5000
      - MONGODB_URI=mongodb://admin:password123@mongodb:27017/ai-nutrition-analyzer?authSource=admin
      - JWT_SECRET=your-super-secret-jwt-key-change-in-production
      - AI_SERVICE_URL=http://ai-services:8000
    depends_on:
      - mongodb
      - ai-services
    networks:
      - ai-nutrition-network

  ai-services:
    build:
      context: ./ai-services
      dockerfile: Dockerfile
    container_name: ai-nutrition-ai
    restart: unless-stopped
    ports:
      - "8000:8000"
    environment:
      - PORT=8000
    volumes:
      - ai_models:/app/models
    networks:
      - ai-nutrition-network

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    container_name: ai-nutrition-frontend
    restart: unless-stopped
    ports:
      - "80:80"
    depends_on:
      - backend
    networks:
      - ai-nutrition-network

volumes:
  mongodb_data:
  ai_models:

networks:
  ai-nutrition-network:
    driver: bridge
